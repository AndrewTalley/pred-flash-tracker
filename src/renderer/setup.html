<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pred Flash Tracker — Setup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0b0f;
      --bg-secondary: #12141c;
      --bg-card: #181b26;
      --bg-card-hover: #1f2333;
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.3);
      --accent-dim: rgba(0, 229, 255, 0.1);
      --danger: #ff3d5a;
      --text-primary: #e8eaf0;
      --text-secondary: #7a7f96;
      --text-muted: #4a4e63;
      --border: #2a2d3e;
      --selected: rgba(0, 229, 255, 0.15);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(10, 11, 15, 0.95);
      border-bottom: 1px solid var(--border);
    }

    .titlebar h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), #00ffa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .titlebar-btns {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .titlebar-btns button {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-minimize { background: #ffbd2e; }
    .btn-close { background: #ff5f57; }
    .titlebar-btns button:hover { opacity: 0.7; }

    .container {
      padding: 16px 20px;
      height: calc(100vh - 50px);
      display: flex;
      flex-direction: column;
      -webkit-app-region: no-drag;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .selected-count { font-size: 13px; font-weight: 600; color: var(--accent); }

    .search-bar {
      width: 100%;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }

    .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
    .search-bar::placeholder { color: var(--text-muted); }

    .role-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

    .role-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .role-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
      padding-bottom: 8px;
    }

    .hero-grid::-webkit-scrollbar { width: 4px; }
    .hero-grid::-webkit-scrollbar-track { background: transparent; }
    .hero-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .hero-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .hero-card:hover { background: var(--bg-card-hover); border-color: #3a3e52; transform: translateY(-1px); }

    .hero-card.selected {
      background: var(--selected);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    .hero-card.selected::after {
      content: '';
      position: absolute;
      top: 4px; right: 4px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
    }

    .hero-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      border: 2px solid var(--border);
      transition: border-color 0.15s;
      overflow: hidden;
    }

    .hero-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .hero-card.selected .hero-avatar { border-color: var(--accent); }

    .hero-name { font-size: 11px; font-weight: 600; text-align: center; line-height: 1.2; color: var(--text-secondary); }
    .hero-card.selected .hero-name { color: var(--text-primary); }

    .hero-role-tag { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    .hotkey-hint { font-size: 12px; color: var(--text-muted); }

    .hotkey-hint kbd {
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 600;
      color: var(--text-secondary);
    }

    .start-btn {
      padding: 10px 32px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #00c4e0);
      color: var(--bg-primary);
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--accent-glow); }
    .start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    .selected-heroes-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 52px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border);
      align-items: center;
    }

    .selected-hero-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px 4px 4px;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .selected-hero-chip:hover { background: rgba(255, 61, 90, 0.1); border-color: var(--danger); }

    .selected-hero-chip .chip-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; font-weight: 700;
      color: var(--accent);
      overflow: hidden;
    }

    .selected-hero-chip .chip-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .selected-hero-chip .chip-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }

    .placeholder-text { color: var(--text-muted); font-size: 13px; font-style: italic; }

    .role-mage .hero-avatar { border-color: rgba(168, 85, 247, 0.4); }
    .role-fighter .hero-avatar { border-color: rgba(249, 115, 22, 0.4); }
    .role-assassin .hero-avatar { border-color: rgba(239, 68, 68, 0.4); }
    .role-ranger .hero-avatar { border-color: rgba(34, 197, 94, 0.4); }
    .role-support .hero-avatar { border-color: rgba(59, 130, 246, 0.4); }
    .role-frontline .hero-avatar { border-color: rgba(234, 179, 8, 0.4); }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>Pred Flash Tracker</h1>
    <div class="titlebar-btns">
      <button class="btn-minimize" onclick="require('electron').ipcRenderer.send('minimize-window')"></button>
      <button class="btn-close" onclick="require('electron').ipcRenderer.send('close-app')"></button>
    </div>
  </div>

  <div class="container">
    <div class="section-header">
      <h2>Select 5 Enemy Heroes</h2>
      <span class="selected-count" id="selectedCount">0 / 5</span>
    </div>

    <div class="selected-heroes-bar" id="selectedBar">
      <span class="placeholder-text">Click heroes below to add them...</span>
    </div>

    <input type="text" class="search-bar" id="searchInput" placeholder="Search heroes...">

    <div class="role-filters">
      <button class="role-btn active" data-role="all">All</button>
      <button class="role-btn" data-role="mage">Mage</button>
      <button class="role-btn" data-role="fighter">Fighter</button>
      <button class="role-btn" data-role="assassin">Assassin</button>
      <button class="role-btn" data-role="ranger">Ranger</button>
      <button class="role-btn" data-role="support">Support</button>
      <button class="role-btn" data-role="frontline">Frontline</button>
    </div>

    <div class="hero-grid" id="heroGrid"></div>

    <div class="bottom-bar">
      <div class="hotkey-hint">
        <kbd>F2</kbd> Toggle overlay &nbsp; <kbd>F3</kbd> Click-through &nbsp; <kbd>F4</kbd> New game
      </div>
      <button class="start-btn" id="startBtn" disabled>Start Tracking</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');
    const fs = require('fs');
    const { HEROES } = require('../heroes-data.js');

    const ASSETS_DIR = path.join(__dirname, '..', 'assets', 'heroes');

    let selectedHeroes = [];
    let activeRole = 'all';
    let searchQuery = '';

    const heroGrid = document.getElementById('heroGrid');
    const selectedBar = document.getElementById('selectedBar');
    const selectedCount = document.getElementById('selectedCount');
    const startBtn = document.getElementById('startBtn');
    const searchInput = document.getElementById('searchInput');

    function heroImageExists(hero) {
      try {
        return fs.existsSync(path.join(ASSETS_DIR, hero.img));
      } catch { return false; }
    }

    function heroImageSrc(hero) {
      return 'file://' + path.join(ASSETS_DIR, hero.img).replace(/\\/g, '/');
    }

    function avatarHTML(hero) {
      if (heroImageExists(hero)) {
        return `<img src="${heroImageSrc(hero)}" alt="${hero.name}" draggable="false" onerror="this.parentElement.textContent='${hero.initials}'">`;
      }
      return hero.initials;
    }

    function renderGrid() {
      heroGrid.innerHTML = '';
      const filtered = HEROES.filter(h => {
        const matchRole = activeRole === 'all' || h.role === activeRole;
        const matchSearch = h.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchRole && matchSearch;
      });

      filtered.forEach(hero => {
        const card = document.createElement('div');
        const isSelected = selectedHeroes.some(s => s.name === hero.name);
        card.className = `hero-card role-${hero.role}${isSelected ? ' selected' : ''}`;
        card.innerHTML = `
          <div class="hero-avatar">${avatarHTML(hero)}</div>
          <div class="hero-name">${hero.name}</div>
          <div class="hero-role-tag">${hero.role}</div>
        `;
        card.addEventListener('click', () => toggleHero(hero));
        heroGrid.appendChild(card);
      });
    }

    function toggleHero(hero) {
      const idx = selectedHeroes.findIndex(s => s.name === hero.name);
      if (idx >= 0) {
        selectedHeroes.splice(idx, 1);
      } else if (selectedHeroes.length < 5) {
        selectedHeroes.push(hero);
      }
      updateUI();
    }

    function updateUI() {
      selectedCount.textContent = `${selectedHeroes.length} / 5`;
      startBtn.disabled = selectedHeroes.length !== 5;

      if (selectedHeroes.length === 0) {
        selectedBar.innerHTML = '<span class="placeholder-text">Click heroes below to add them...</span>';
      } else {
        selectedBar.innerHTML = selectedHeroes.map(h => `
          <div class="selected-hero-chip" data-hero="${h.name}">
            <div class="chip-avatar">${avatarHTML(h)}</div>
            <span class="chip-name">${h.name}</span>
          </div>
        `).join('');
        selectedBar.querySelectorAll('.selected-hero-chip').forEach(chip => {
          chip.addEventListener('click', () => {
            const hero = HEROES.find(h => h.name === chip.dataset.hero);
            if (hero) toggleHero(hero);
          });
        });
      }
      renderGrid();
    }

    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRole = btn.dataset.role;
        renderGrid();
      });
    });

    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderGrid();
    });

    startBtn.addEventListener('click', () => {
      ipcRenderer.send('start-overlay', selectedHeroes);
    });

    renderGrid();
  </script>
</body>
</html>
