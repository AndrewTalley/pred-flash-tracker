<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flash Tracker Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: rgba(8, 9, 14, 0.45);
      --bg-slot: rgba(18, 20, 30, 0.75);
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.35);
      --danger: #ff3d5a;
      --warning: #ffbd2e;
      --warning-glow: rgba(255, 189, 46, 0.4);
      --ready: #00e676;
      --text-dim: #7a7f96;
      --border: rgba(42, 45, 62, 0.6);
    }

    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      user-select: none;
      width: 100%;
      height: 100%;
    }

    .overlay {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 5px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
      width: 100%;
      height: 100%;
      align-content: flex-start;
      justify-content: center;
    }

    .overlay.drag-mode {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      cursor: grab;
      -webkit-app-region: drag;
    }

    .overlay.drag-mode:active {
      cursor: grabbing;
    }

    /* Horizontal (default) */
    .overlay.layout-horizontal {
      flex-direction: row;
    }

    .overlay.layout-horizontal .hero-slot {
      flex-direction: column;
      width: 80px;
    }

    /* Vertical — when window is narrow */
    .overlay.layout-vertical {
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }

    .overlay.layout-vertical .hero-slot {
      flex-direction: row;
      width: 100%;
      gap: 8px;
    }

    .overlay.layout-vertical .hero-slot .avatar-wrap {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .overlay.layout-vertical .slot-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .overlay.layout-vertical .hero-name-label {
      text-align: left;
    }

    .hero-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 6px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
      -webkit-app-region: no-drag;
    }

    .hero-slot:hover {
      background: var(--bg-slot);
      border-color: var(--border);
    }

    .avatar-wrap {
      position: relative;
      width: 42px;
      height: 42px;
      margin-bottom: 2px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      overflow: hidden;
      border: 2px solid var(--border);
      background: var(--bg-slot);
      transition: border-color 0.2s, box-shadow 0.3s;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .timer-ring {
      position: absolute;
      top: -3px;
      left: -3px;
      width: 48px;
      height: 48px;
      transform: rotate(-90deg);
    }

    .timer-ring circle { fill: none; stroke-width: 2.5; }
    .timer-ring .ring-bg { stroke: rgba(42, 45, 62, 0.4); }

    .timer-ring .ring-progress {
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }

    .hero-slot.idle .avatar { border-color: rgba(120, 130, 160, 0.3); }
    .hero-slot.idle .ring-progress { stroke: transparent; }
    .hero-slot.idle .timer-label { display: none; }

    .hero-slot.on-cooldown .avatar {
      border-color: var(--danger);
      background: rgba(255, 61, 90, 0.1);
      color: var(--danger);
    }
    .hero-slot.on-cooldown .ring-progress { stroke: var(--danger); }
    .hero-slot.on-cooldown .avatar img {
      filter: grayscale(70%) brightness(0.55);
      transition: filter 0.3s;
    }
    .hero-slot.on-cooldown .timer-label {
      display: block;
      color: var(--danger);
    }

    .hero-slot.almost-ready .avatar {
      border-color: var(--warning);
      background: rgba(255, 189, 46, 0.1);
      color: var(--warning);
    }
    .hero-slot.almost-ready .ring-progress { stroke: var(--warning); }
    .hero-slot.almost-ready .avatar img {
      filter: grayscale(30%) brightness(0.75);
      transition: filter 0.3s;
    }
    .hero-slot.almost-ready .timer-label {
      display: block;
      color: var(--warning);
    }

    @keyframes pulse-warning {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50% { box-shadow: 0 0 8px var(--warning-glow); }
    }
    .hero-slot.almost-ready { animation: pulse-warning 2s ease-in-out infinite; }

    .hero-slot.just-ready .avatar {
      border-color: var(--ready);
      box-shadow: 0 0 10px rgba(0, 230, 118, 0.4);
    }
    .hero-slot.just-ready .ring-progress { stroke: var(--ready); }
    .hero-slot.just-ready .timer-label { display: none; }

    .hero-name-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 72px;
    }

    .timer-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: none;
    }

  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>


  <script>
    const { ipcRenderer } = require('electron');
    const path = require('path');
    const fs = require('fs');

    const FLASH_COOLDOWN = 300;
    const ALMOST_READY_THRESHOLD = 30;
    const JUST_READY_DURATION = 3000;

    let heroes = [];
    let timers = {};
    let inDragMode = false;

    const overlay = document.getElementById('overlay');
    const circumference = 2 * Math.PI * 21;
    const ASSETS_DIR = path.join(__dirname, '..', 'assets', 'heroes');

    function heroImageExists(hero) {
      try { return fs.existsSync(path.join(ASSETS_DIR, hero.img)); }
      catch { return false; }
    }

    function heroImageSrc(hero) {
      return 'file://' + path.join(ASSETS_DIR, hero.img).replace(/\\/g, '/');
    }

    function avatarContent(hero) {
      if (heroImageExists(hero)) {
        return `<img src="${heroImageSrc(hero)}" alt="${hero.name}" draggable="false" onerror="this.parentElement.textContent='${hero.initials}'">`;
      }
      return hero.initials;
    }

    function formatTime(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    function safeId(name) {
      return name.replace(/[^a-zA-Z0-9]/g, '_');
    }

    // ===== HOVER CLICK-THROUGH =====
    // Hero slots tell main process to accept clicks when hovered.
    // This means you just hover a hero and click — no F3 needed.
    function setupHoverClickThrough(slot) {
      slot.addEventListener('mouseenter', () => {
        if (inDragMode) return;
        ipcRenderer.send('set-clickable');
      });
      slot.addEventListener('mouseleave', () => {
        if (inDragMode) return;
        ipcRenderer.send('set-click-through');
      });
    }

    // ===== RENDER =====
    function renderSlots() {
      overlay.innerHTML = '';

      heroes.forEach(hero => {
        const slot = document.createElement('div');
        slot.className = 'hero-slot idle';
        slot.id = `slot-${safeId(hero.name)}`;
        slot.dataset.hero = hero.name;
        slot.innerHTML = `
          <div class="avatar-wrap">
            <svg class="timer-ring" viewBox="0 0 48 48">
              <circle class="ring-bg" cx="24" cy="24" r="21" />
              <circle class="ring-progress" cx="24" cy="24" r="21"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="0" />
            </svg>
            <div class="avatar">${avatarContent(hero)}</div>
          </div>
          <div class="slot-info">
            <div class="hero-name-label">${hero.name}</div>
            <div class="timer-label"></div>
          </div>
        `;

        slot.addEventListener('click', (e) => {
          e.stopPropagation();
          startTimer(hero.name);
        });
        slot.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          cancelTimer(hero.name);
        });

        setupHoverClickThrough(slot);
        overlay.appendChild(slot);
      });
    }

    // Reset via F4 only (handled in main process)

    // ===== TIMERS =====
    function getSlotEl(name) {
      return document.getElementById(`slot-${safeId(name)}`);
    }

    function startTimer(heroName) {
      if (timers[heroName]) return;
      const slot = getSlotEl(heroName);
      if (!slot) return;

      const endTime = Date.now() + (FLASH_COOLDOWN * 1000);
      const ringProgress = slot.querySelector('.ring-progress');
      const timerLabel = slot.querySelector('.timer-label');

      timers[heroName] = {
        endTime,
        intervalId: setInterval(() => {
          const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));

          if (remaining <= 0) {
            clearInterval(timers[heroName].intervalId);
            delete timers[heroName];
            slot.className = 'hero-slot just-ready';
            timerLabel.textContent = '';
            ringProgress.style.strokeDashoffset = '0';
            setTimeout(() => {
              if (!timers[heroName]) slot.className = 'hero-slot idle';
            }, JUST_READY_DURATION);
            return;
          }

          timerLabel.textContent = formatTime(remaining);
          const fraction = remaining / FLASH_COOLDOWN;
          ringProgress.style.strokeDashoffset = `${circumference * (1 - fraction)}`;
          slot.className = remaining <= ALMOST_READY_THRESHOLD
            ? 'hero-slot almost-ready'
            : 'hero-slot on-cooldown';
        }, 250),
      };

      slot.className = 'hero-slot on-cooldown';
      timerLabel.textContent = formatTime(FLASH_COOLDOWN);
    }

    function cancelTimer(heroName) {
      if (!timers[heroName]) return;
      clearInterval(timers[heroName].intervalId);
      delete timers[heroName];
      const slot = getSlotEl(heroName);
      if (!slot) return;
      slot.className = 'hero-slot idle';
      slot.querySelector('.timer-label').textContent = '';
      slot.querySelector('.ring-progress').style.strokeDashoffset = '0';
    }

    // ===== IPC =====
    ipcRenderer.on('load-heroes', (event, heroData) => {
      heroes = heroData;
      renderSlots();
    });

    ipcRenderer.on('drag-mode', (event, active) => {
      inDragMode = active;
      if (active) {
        overlay.classList.add('drag-mode');
      } else {
        overlay.classList.remove('drag-mode');
      }
      // Force Chromium to recalculate -webkit-app-region
      document.body.style.display = 'none';
      void document.body.offsetHeight;
      document.body.style.display = '';
    });

    // Layout flip — vertical when narrow, horizontal when wide
    const VERTICAL_THRESHOLD = 350;
    let currentLayout = 'horizontal';

    function updateLayout(windowWidth) {
      const newLayout = windowWidth < VERTICAL_THRESHOLD ? 'vertical' : 'horizontal';
      if (newLayout !== currentLayout) {
        currentLayout = newLayout;
        overlay.classList.remove('layout-horizontal', 'layout-vertical');
        overlay.classList.add(`layout-${newLayout}`);
      }
    }

    // Set initial layout
    overlay.classList.add('layout-horizontal');

    ipcRenderer.on('window-resized', (event, { width }) => {
      updateLayout(width);
    });
  </script>
</body>
</html>
